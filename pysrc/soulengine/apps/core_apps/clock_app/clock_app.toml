app_name="Clock App"
app_path="./apps/core_apps/clock_app/clock_app.py"
app_start_command="python"
app_start_args="./apps/core_apps/clock_app/clock_app.py"
app_handle_name="clock_app"
app_launch_mode="REPL"
app_usage_guideline="""
Use this app for
- Setting quick time-based alarms from the terminal
- Checking the current date and time instantly
- Scheduling delayed messages during long running tasks
- Keeping track of time while focused in the terminal

The first argument is the duration or target time, followed by the alarm message.

## Duration Formats
  30s                  -> seconds
  5m                   -> minutes
  2h                   -> hours
  15:30                -> today at HH:MM
  2026-03-11 18:00     -> specific date and time

## Examples
Quick alarm       -> &clock_app 30s Take a break
Cooking Timer        -> &clock_app 5m Check the oven
Meeting Alert        -> &clock_app 2h Team standup
Time-based alarm  -> &clock_app 15:30 Lunch meeting
Scheduled alarm   -> &clock_app 2026-03-11 18:00 End of day review
Current Time         -> &clock_app now

## Output Behavior

* On setting a alarm, the **current time**, **target fire time**, and **seconds remaining** are returned.
* When the timer fires, the **alarm message** is printed along with the **exact fired time**.
* Using `now` returns only the **current date and time**.
"""

[[app_command_signatures]]
command = "set_alarm"
consumes = ["message","datetime","time interval"]
produces = ["alarm"]
action = "schedule"

[[app_command_signatures]]
command = "now"
consumes = ["ping"]
produces = ["current datetime"]
action = "read"