app_name="PDF Reader App"
app_path="./apps/core_apps/pdf_reader_app/pdf_reader_app.py"
app_start_command="python"
app_start_args="./apps/core_apps/pdf_reader_app/pdf_reader_app.py"
app_handle_name="pdf_reader"
app_launch_mode="ONE_SHOT"
app_usage_guideline="""
Use this app for:
- Reading and extracting content from PDF files at a given path
- Converting PDF pages into clean, LLM-readable Markdown
- Summarizing specific page ranges from large documents
- Extracting metadata (title, author, page count) from a PDF
- Checking if a PDF is readable or password-protected before processing

## Commands & Examples

### Read Entire PDF
&pdf_reader read /path/to/document.pdf

### Read Specific Pages
&pdf_reader read /path/to/document.pdf --pages 1-5
&pdf_reader read /path/to/document.pdf --pages 3

### Read with Page Numbers in Output
&pdf_reader read /path/to/document.pdf --numbered

### Get Metadata Only
&pdf_reader meta /path/to/document.pdf

### Check PDF Info (page count, readable, encrypted)
&pdf_reader info /path/to/document.pdf

## Output Behavior

* Extracted text is returned as clean Markdown with headings, paragraphs, and lists preserved where detectable.
* Each page is separated by a `---` horizontal rule with a `<!-- Page N -->` comment marker.
* Tables are converted to Markdown table syntax where possible.
* If the PDF is scanned/image-only, a warning is returned and OCR is attempted via pytesseract if available.
* Metadata fields (title, author, subject, creator, page count) are returned as a Markdown frontmatter block.
* Password-protected PDFs return an `encrypted` status with guidance.
"""

[[app_command_signatures]]
command = "read"
consumes = ["PDF Filepath","pdf", "pages?", "numbered?","filepath"]
produces = ["text"]
action = "read"

[[app_command_signatures]]
command = "meta"
consumes = ["PDF FilePath","pdf","filepath"]
produces = ["text"]
action = "read"

[[app_command_signatures]]
command = "info"
consumes = ["PDF FilePath","pdf","filepath"]
produces = ["stats"]
action = "read"