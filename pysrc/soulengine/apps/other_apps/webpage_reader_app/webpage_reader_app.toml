consumes = ["url", "query?","webpage"]
produces = ["markdown"]
action = "read"

[[app_command_signatures]]
command = "save"
consumes = ["url", "out?", "query?","webpage"]
produces = ["markdown_file"]
action = "write"

[[app_command_signatures]]
command = "raw"
consumes = ["url","webpage"]
produces = ["html"]
action = "read"

[[app_command_signatures]]
command = "meta"
consumes = ["url","webpage"]
produces = ["metadata"]
action = "read"

[[app_command_signatures]]
command = "links"
consumes = ["url", "filter?"]
produces = ["link_list"]
action = "read"

[[app_command_signatures]]
command = "images"
consumes = ["url","webpage"]
produces = ["image_list"]
action = "read"