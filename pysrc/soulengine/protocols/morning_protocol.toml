protocol_name = "morning_greeting"
protocol_handle_name = "morning_greeting"
protocol_description = "A protocol that greets the user with 'Good Morning' based on the current time from the clock app."
trigger_prompt = "Trigger this protocol every day in the morning or when the user says 'Good Morning'"
protocol_result = "The protocol should wish the user a good morning."
apps_used = ["clock_app"]

[[step]]
id = 1
label = "Fetch Current Time"
app_command = "&clock_app now"
completion_check_condition = "Clock app should return the current date and time successfully"

[[step]]
id = 2
label = "Morning Validation"
prompt = "Based on the time retrieved, if it is currently morning, respond with 'Good Morning!'. If the user triggered this manually and it is not morning, acknowledge the greeting appropriately."