app_name="Grep App"
app_path="./apps/core_apps/grep_app/grep_app.py"
app_start_command="python"
app_start_args="./apps/core_apps/grep_app/grep_app.py"
app_handle_name="grep_app"
app_launch_mode="REPL"
app_usage_guideline="""
Use this app for:
- Searching file contents for a pattern in a single file
- Searching recursively across all files in a directory
- Filtering lines from piped/inline input by regex or literal match
- Counting the number of matches per file
- Searching with surrounding context lines (before/after)
- Listing only the files that contain at least one match

---

## Commands

### search
Search a single file or glob target for lines matching a pattern.

  Inputs:
    pattern    -> the regex or literal string to match
    target     -> a file path or glob (e.g. file.log, *.py)

  Outputs:
    file         -> path of the matched file
    line_number  -> 1-based line number of the match
    line         -> full text of the matched line
    match_span   -> character offset of match as "start:end"

  Example:
    &grep_app search "error" ./logs/app.log
    &grep_app search -i "warning" ./logs/app.log
    &grep_app search -n -w "fail" ./src/main.py
    &grep_app search -F "1+1" ./notes.txt
    &grep_app search --max 5 "timeout" ./logs/app.log


### search_recursive
Recursively search all files under a directory for lines matching a pattern.

  Inputs:
    pattern    -> the regex or literal string to match
    directory  -> root directory to walk recursively

  Outputs:
    file         -> path of the matched file
    line_number  -> 1-based line number of the match
    line         -> full text of the matched line
    match_span   -> character offset of match as "start:end"

  Example:
    &grep_app search_recursive "TODO" ./src
    &grep_app search_recursive -i "fixme" ./src
    &grep_app search_recursive -n "(error|warn|fatal)" ./logs
    &grep_app search_recursive --max 10 "panic" ./src


### search_stdin
Search over lines of text passed directly as input (stdin equivalent).
Use this when the text to search is already available inline rather than in a file.

  Inputs:
    pattern      -> the regex or literal string to match
    input_lines  -> the text content to search (multiline string)

  Outputs:
    line_number  -> 1-based line number within the provided input
    line         -> full text of the matched line
    match_span   -> character offset of match as "start:end"

  Example:
    &grep_app search_stdin "GET /api" "<paste log lines here>"
    &grep_app search_stdin -v "debug" "<paste log lines here>"
    &grep_app search_stdin -i "error" "<multiline text>"


### count
Count the number of matching lines per file instead of returning matched lines.

  Inputs:
    pattern    -> the regex or literal string to match
    target     -> a file path, glob, or directory

  Outputs:
    file         -> path of the searched file
    match_count  -> number of lines that matched in that file

  Example:
    &grep_app count "failed" ./logs/app.log
    &grep_app count -i "error" ./logs
    &grep_app count -w "null" ./src/main.py


### search_with_context
Search a file and return matched lines together with N lines of surrounding context.

  Inputs:
    pattern      -> the regex or literal string to match
    target       -> a file path or glob
    before_lines -> number of lines to include before each match (integer >= 0)
    after_lines  -> number of lines to include after each match (integer >= 0)

  Outputs:
    file           -> path of the matched file
    line_number    -> 1-based line number of the match
    line           -> full text of the matched line
    context_before -> list of lines appearing before the match
    context_after  -> list of lines appearing after the match

  Example:
    &grep_app search_with_context "panic" ./logs/app.log 3 3
    &grep_app search_with_context "error" ./logs/app.log 2 0
    &grep_app search_with_context -i "warn" ./app.log 0 5


### list_matching_files
Return only the list of files that contain at least one match — no line content.
Useful for quickly identifying which files are affected before doing a full search.

  Inputs:
    pattern    -> the regex or literal string to match
    directory  -> root directory to walk recursively

  Outputs:
    file_list  -> list of file paths that contain one or more matches

  Example:
    &grep_app list_matching_files "TODO" ./src
    &grep_app list_matching_files -i "deprecated" ./lib
    &grep_app list_matching_files "\\\\bfail\\\\b" ./tests

---

## Pattern Formats

  hello                -> literal string match
  "hello world"        -> literal phrase (quoted)
  ^error               -> lines starting with "error"
  \\.py$               -> lines/paths ending in .py (regex)
  (foo|bar)            -> match foo or bar
  \\d{3}-\\d{4}        -> phone number pattern (regex)

---

## Shared Flags
These flags are supported across all commands unless noted otherwise.

  --ignore-case / -i   -> case-insensitive match
  --invert     / -v    -> return lines that do NOT match (not available on count or list_matching_files)
  --line-numbers/ -n   -> include line numbers in output (search, search_recursive, search_stdin)
  --word       / -w    -> match whole words only
  --fixed      / -F    -> treat pattern as a fixed string, not regex
  --max N              -> stop after N total matches

Context flags (for search and search_recursive only; prefer search_with_context command for full control):
  --context N / -C N   -> N lines before and after each match
  --before  N / -B N   -> N lines before each match
  --after   N / -A N   -> N lines after each match

---

## Output Behavior

* search / search_recursive / search_stdin
    Each match returns: file, line_number, matched line, match_span (start:end char offsets).
* count
    Returns file and match_count per file. No line content.
* search_with_context
    Returns matched lines plus context_before and context_after lists tagged by type.
* list_matching_files
    Returns only file paths; no line content or counts.
* No matches returns an explicit no_matches result rather than empty output.
* Errors (bad regex, file not found, unreadable directory) return a structured error with a clear reason field.
"""

[[app_command_signatures]]
command = "search"
consumes = ["pattern", "target","search pattern"]
produces = ["file", "line_number", "line", "match_span"]
action = "read"

[[app_command_signatures]]
command = "search_recursive"
consumes = ["pattern", "directory","search pattern"]
produces = ["file", "line_number", "line", "match_span"]
action = "read"

[[app_command_signatures]]
command = "search_stdin"
consumes = ["pattern", "input_lines","search pattern"]
produces = ["line_number", "line", "match_span"]
action = "compute"

[[app_command_signatures]]
command = "count"
consumes = ["pattern", "target","search pattern"]
produces = ["file", "match_count"]
action = "compute"

[[app_command_signatures]]
command = "search_with_context"
consumes = ["pattern", "target", "before_lines", "after_lines","search pattern"]
produces = ["file", "line_number", "line", "context_before", "context_after"]
action = "read"

[[app_command_signatures]]
command = "list_matching_files"
consumes = ["pattern", "directory","search pattern"]
produces = ["file_list"]
action = "read"